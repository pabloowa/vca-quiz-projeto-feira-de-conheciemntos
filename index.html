<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz VCA & Falconi</title>
  
  <!-- Fontes Modernas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome para Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Link para o CSS Externo -->
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- Elementos de fundo abstratos e dinâmicos -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <main class="quiz-container">
    
    <!-- Cabeçalho Principal -->
    <div class="header">
      <div class="brand-logo-container">
        <!-- Substitua pelo link real da logo da VCA -->
        <img src="vca_logo.png" alt="Logo VCA" class="brand-logo">
      </div>
      <h1>Quiz VCA & Falconi</h1>
      <p id="header-subtitle">Teste seus conhecimentos sobre a empresa e o projeto.</p>
    </div>

    <!-- Barra de Progresso Premium -->
    <div class="progress-container hidden" id="quiz-progress">
      <div id="progress-bar"></div>
    </div>

    <!-- TELA 1: INÍCIO -->
    <div id="start-screen" class="screen">
      <div class="welcome-card">
        <div class="welcome-icon-box">
          <i class="fa-solid fa-rocket animate-bounce"></i>
        </div>
        <h2>Vamos testar seus conhecimentos?</h2>
        <p>Aprenda mais sobre os processos, estratégias, identidade e metodologias que direcionam a sinergia entre a VCA e a Falconi.</p>
        <button id="start-btn" class="primary-btn">
          Começar Quiz <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- TELA 2: PERGUNTAS -->
    <div id="question-screen" class="screen hidden">
      <div class="question-box">
        <span id="question-number" class="badge">Pergunta 1 de 10</span>
        <h2 id="question"></h2>
        
        <div id="answers" class="answers">
          <!-- As alternativas serão geradas pelo JavaScript -->
        </div>
        
        <button id="next-btn" class="primary-btn hidden">
          Próxima Pergunta <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <!-- TELA 3: RESULTADOS -->
    <div id="result-screen" class="screen hidden">
      <div class="result-box">
        <div class="score-circle">
          <span class="number" id="result-score-num">0</span>
          <span class="label">Acertos</span>
        </div>
        <h2>Resultado Final</h2>
        <p id="score-text"></p>
        <button onclick="location.reload()" class="primary-btn">
          <i class="fa-solid fa-rotate-left"></i> Recomeçar Quiz
        </button>
      </div>
    </div>

  </main>

  <!-- Link para o script JS Externo -->
  <script src="assets/script.js"></script>
</body>
</html>
